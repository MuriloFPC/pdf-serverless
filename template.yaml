AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: SAM Template for pdf-serverless

Parameters:
  Env:
    Type: String
    Default: freetier
    AllowedValues: [freetier, ondemand]
    Description: Environment to deploy to (freetier with provisioned capacity or ondemand with PAY_PER_REQUEST)

  JwtSecret:
    Type: String
    NoEcho: true
    Description: JWT Secret for authentication (DO NOT use default in production)

Mappings:
  Config:
    freetier:
      BucketName: "pdf-serverless-opensource"
      BillingMode: "PROVISIONED"
    ondemand:
      BucketName: "pdf-serverless-opensource"
      BillingMode: "PAY_PER_REQUEST"

Conditions:
  IsFreeTier: !Equals [!Ref Env, freetier]

Globals:
  Function:
    Timeout: 30
    MemorySize: 256
    Runtime: provided.al2023
    Architectures:
      - arm64
    Environment:
      Variables:
        USER_TABLE: !Ref UserTable
        JOB_TABLE: !Ref JobTable
        S3_BUCKET_NAME: !Ref PDFBucket
        SQS_QUEUE_URL: !Ref PDFQueue
        JWT_SECRET: !Ref JwtSecret

Resources:
  ServerlessHttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      CorsConfiguration:
        AllowOrigins:
          - "*"
        AllowHeaders:
          - "Content-Type"
          - "Authorization"
          - "Origin"
          - "Accept"
        AllowMethods:
          - "GET"
          - "POST"
          - "PUT"
          - "DELETE"
          - "OPTIONS"
        MaxAge: 600

  APIFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: makefile
    Properties:
      FunctionName: pdf-serverless-api
      Handler: bootstrap
      CodeUri: .
      Events:
        ApiEvent:
          Type: HttpApi
          Properties:
            ApiId: !Ref ServerlessHttpApi
            Path: /{proxy+}
            Method: ANY
        RootEvent:
          Type: HttpApi
          Properties:
            ApiId: !Ref ServerlessHttpApi
            Path: /
            Method: ANY
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:GetItem
                - dynamodb:PutItem
                - dynamodb:UpdateItem
                - dynamodb:Query
              Resource:
                - !GetAtt UserTable.Arn
                - !GetAtt JobTable.Arn
                - !Sub "${UserTable.Arn}/index/*"
                - !Sub "${JobTable.Arn}/index/*"
            - Effect: Allow
              Action:
                - s3:PutObject
                - s3:GetObject
                - s3:ListBucket
              Resource:
                - !GetAtt PDFBucket.Arn
                - !Sub "${PDFBucket.Arn}/*"
            - Effect: Allow
              Action:
                - sqs:SendMessage
              Resource: !GetAtt PDFQueue.Arn

  WorkerFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: makefile
    Properties:
      FunctionName: pdf-serverless-worker
      Handler: bootstrap
      CodeUri: .
      Events:
        SQSEvent:
          Type: SQS
          Properties:
            Queue: !GetAtt PDFQueue.Arn
            BatchSize: 10
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:GetItem
                - dynamodb:PutItem
                - dynamodb:UpdateItem
                - dynamodb:Query
              Resource:
                - !GetAtt UserTable.Arn
                - !GetAtt JobTable.Arn
                - !Sub "${UserTable.Arn}/index/*"
                - !Sub "${JobTable.Arn}/index/*"
            - Effect: Allow
              Action:
                - s3:PutObject
                - s3:GetObject
                - s3:ListBucket
              Resource:
                - !GetAtt PDFBucket.Arn
                - !Sub "${PDFBucket.Arn}/*"
            - Effect: Allow
              Action:
                - sqs:ReceiveMessage
                - sqs:DeleteMessage
                - sqs:GetQueueAttributes
              Resource: !GetAtt PDFQueue.Arn

  UserTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: pdf-serverless-user
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
        - AttributeName: email
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: EmailIndex
          KeySchema:
            - AttributeName: email
              KeyType: HASH
          Projection:
            ProjectionType: ALL
          ProvisionedThroughput: !If [IsFreeTier, {ReadCapacityUnits: 5, WriteCapacityUnits: 5}, !Ref "AWS::NoValue"]
      BillingMode: !FindInMap [Config, !Ref Env, BillingMode]
      ProvisionedThroughput: !If [IsFreeTier, {ReadCapacityUnits: 5, WriteCapacityUnits: 5}, !Ref "AWS::NoValue"]

  JobTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: pdf-serverless-job
      AttributeDefinitions:
        - AttributeName: job_id
          AttributeType: S
        - AttributeName: user_id
          AttributeType: S
      KeySchema:
        - AttributeName: job_id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: UserIDIndex
          KeySchema:
            - AttributeName: user_id
              KeyType: HASH
          Projection:
            ProjectionType: ALL
          ProvisionedThroughput: !If [IsFreeTier, {ReadCapacityUnits: 7, WriteCapacityUnits: 7}, !Ref "AWS::NoValue"]
      BillingMode: !FindInMap [Config, !Ref Env, BillingMode]
      ProvisionedThroughput: !If [IsFreeTier, {ReadCapacityUnits: 8, WriteCapacityUnits: 8}, !Ref "AWS::NoValue"]

  PDFBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !FindInMap [Config, !Ref Env, BucketName]
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      CorsConfiguration:
        CorsRules:
          - AllowedHeaders:
              - "*"
            AllowedMethods:
              - GET
              - PUT
              - POST
              - HEAD
            AllowedOrigins:
              - "*"
            MaxAge: 3000
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      LifecycleConfiguration:
        Rules:
          - Id: Expire24h
            Status: Enabled
            Prefix: ttl/24h/
            ExpirationInDays: 1
          - Id: Expire72h
            Status: Enabled
            Prefix: ttl/72h/
            ExpirationInDays: 3
          - Id: Expire1Week
            Status: Enabled
            Prefix: ttl/1week/
            ExpirationInDays: 7
          - Id: Expire1Month
            Status: Enabled
            Prefix: ttl/1month/
            ExpirationInDays: 30
          - Id: Expire3Month
            Status: Enabled
            Prefix: ttl/3month/
            ExpirationInDays: 90
          - Id: Expire6Month
            Status: Enabled
            Prefix: ttl/6month/
            ExpirationInDays: 180
          - Id: Expire1Year
            Status: Enabled
            Prefix: ttl/1year/
            ExpirationInDays: 365
          - Id: Expire3Years
            Status: Enabled
            Prefix: ttl/3years/
            ExpirationInDays: 1095
          - Id: Expire5Years
            Status: Enabled
            Prefix: ttl/5years/
            ExpirationInDays: 1825
          - Id: Expire10Years
            Status: Enabled
            Prefix: ttl/10years/
            ExpirationInDays: 3650

  PDFQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: pdf-serverless-queue
      VisibilityTimeout: 300

  FrontendBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: pdf-serverless-opensource-frontend
      WebsiteConfiguration:
        IndexDocument: index.html
        ErrorDocument: index.html
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false
        BlockPublicPolicy: false
        IgnorePublicAcls: false
        RestrictPublicBuckets: false

  FrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FrontendBucket
      PolicyDocument:
        Id: PublicReadPolicy
        Version: '2012-10-17'
        Statement:
          - Sid: PublicReadForGetBucketObjects
            Effect: Allow
            Principal: "*"
            Action: 's3:GetObject'
            Resource: !Sub "arn:aws:s3:::${FrontendBucket}/*"

Outputs:
  ApiUrl:
    Description: "API Gateway endpoint URL"
    Value: !Sub "https://${ServerlessHttpApi}.execute-api.${AWS::Region}.amazonaws.com/"
  FrontendUrl:
    Description: "Frontend S3 Website URL"
    Value: !GetAtt FrontendBucket.WebsiteURL
  FrontendBucketName:
    Description: "Frontend S3 Bucket Name"
    Value: !Ref FrontendBucket
