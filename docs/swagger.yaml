basePath: /
definitions:
  entities.FileMetadata:
    properties:
      filename:
        type: string
      page_count:
        type: integer
      path:
        type: string
      size_kb:
        type: number
      uploaded_at:
        type: string
    type: object
  entities.JobStatus:
    enum:
    - awaiting_files
    - pending
    - processing
    - completed
    - failed
    - manually_excluded
    - automatically_excluded
    type: string
    x-enum-varnames:
    - StatusAwaitingFiles
    - StatusPending
    - StatusProcessing
    - StatusCompleted
    - StatusFailed
    - StatusManuallyExcluded
    - StatusAutomaticallyExcluded
  entities.PDFJob:
    properties:
      created_at:
        type: string
      delete_at:
        type: string
      deleted_at:
        type: string
      input_files:
        items:
          $ref: '#/definitions/entities.FileMetadata'
        type: array
      job_id:
        type: string
      metadata:
        additionalProperties: {}
        type: object
      output_files:
        items:
          $ref: '#/definitions/entities.FileMetadata'
        type: array
      password:
        type: string
      process_type:
        $ref: '#/definitions/entities.ProcessType'
      status:
        $ref: '#/definitions/entities.JobStatus'
      ttl:
        $ref: '#/definitions/entities.TTLType'
      user_id:
        type: string
    type: object
  entities.ProcessType:
    enum:
    - merge
    - split
    - protect
    - remove_password
    - optimize
    type: string
    x-enum-varnames:
    - TypeMerge
    - TypeSplit
    - TypeProtect
    - TypeRemovePassword
    - TypeOptimize
  entities.TTLType:
    enum:
    - 24h
    - 72h
    - 1week
    - 1month
    - 3month
    - 6month
    - 1year
    - 3years
    - 5years
    - 10years
    - unlimited
    type: string
    x-enum-varnames:
    - TTL24h
    - TTL72h
    - TTL1Week
    - TTL1Month
    - TTL3Month
    - TTL6Month
    - TTL1Year
    - TTL3Year
    - TTL5Year
    - TTL10Year
    - TTLForever
  router.LoginRequest:
    properties:
      email:
        type: string
      password:
        type: string
    type: object
  router.ProcessRequest:
    properties:
      metadata:
        additionalProperties: {}
        type: object
      password:
        type: string
      ttl:
        $ref: '#/definitions/entities.TTLType'
      type:
        $ref: '#/definitions/entities.ProcessType'
    type: object
  router.RegisterRequest:
    properties:
      email:
        type: string
      password:
        type: string
    type: object
host: localhost:3000
info:
  contact:
    email: support@swagger.io
    name: API Support
    url: http://www.swagger.io/support
  description: This is a serverless PDF processing API.
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: http://swagger.io/terms/
  title: PDF Serverless API
  version: "1.0"
paths:
  /auth/login:
    post:
      consumes:
      - application/json
      description: Authenticate user and return JWT token
      parameters:
      - description: Login info
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/router.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Login user
      tags:
      - auth
  /auth/register:
    post:
      consumes:
      - application/json
      description: Create a new user with email and password
      parameters:
      - description: Registration info
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/router.RegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "409":
          description: Conflict
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Register a new user
      tags:
      - auth
  /pdf/{id}:
    delete:
      description: Removes a PDF job and its associated files
      parameters:
      - description: Bearer <token>
        in: header
        name: Authorization
        required: true
        type: string
      - description: Job ID
        in: path
        name: id
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Delete a PDF job
      tags:
      - pdf
  /pdf/complete-upload/{id}:
    post:
      description: Notifies the system that all files for a job have been uploaded
      parameters:
      - description: Bearer <token>
        in: header
        name: Authorization
        required: true
        type: string
      - description: Job ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Mark job uploads as complete
      tags:
      - pdf
  /pdf/download/{id}:
    get:
      description: Generates a URL for downloading a processed PDF file
      parameters:
      - description: Bearer <token>
        in: header
        name: Authorization
        required: true
        type: string
      - description: Job ID
        in: path
        name: id
        required: true
        type: string
      - description: File path from job output
        in: query
        name: filename
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get a presigned S3 download URL
      tags:
      - pdf
  /pdf/list:
    get:
      description: Returns all PDF processing jobs for the authenticated user
      parameters:
      - description: Bearer <token>
        in: header
        name: Authorization
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/entities.PDFJob'
            type: array
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: List user PDF jobs
      tags:
      - pdf
  /pdf/presigned-url/{id}:
    get:
      description: Generates a URL for direct upload to S3 for a specific job
      parameters:
      - description: Bearer <token>
        in: header
        name: Authorization
        required: true
        type: string
      - description: Job ID
        in: path
        name: id
        required: true
        type: string
      - description: Original filename
        in: query
        name: filename
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get a presigned S3 upload URL
      tags:
      - pdf
  /pdf/process:
    post:
      consumes:
      - application/json
      description: Initialize a PDF job (merge, split, protect, etc.)
      parameters:
      - description: Bearer <token>
        in: header
        name: Authorization
        required: true
        type: string
      - description: Process request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/router.ProcessRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/entities.PDFJob'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Create a new PDF processing job
      tags:
      - pdf
  /pdf/status/{id}:
    get:
      description: Returns the current status of a PDF processing job
      parameters:
      - description: Bearer <token>
        in: header
        name: Authorization
        required: true
        type: string
      - description: Job ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/entities.PDFJob'
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get PDF job status
      tags:
      - pdf
securityDefinitions:
  ApiKeyAuth:
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
